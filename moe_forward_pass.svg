<?xml version="1.0" encoding="UTF-8"?>
<svg width="620" height="760" viewBox="0 0 620 760" xmlns="http://www.w3.org/2000/svg" font-family="monospace, 'Courier New'">

  <!-- Background -->
  <rect width="620" height="760" fill="#0f1117"/>

  <!-- ── Input ── -->
  <rect x="185" y="20" width="250" height="44" rx="8" fill="#1e2433" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="310" y="38" text-anchor="middle" fill="#e8eaf6" font-size="13" font-weight="bold">Input tokens</text>
  <text x="310" y="56" text-anchor="middle" fill="#7986cb" font-size="11">[N, H]</text>

  <!-- arrow: input → router -->
  <line x1="310" y1="64" x2="310" y2="100" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Router ── -->
  <rect x="120" y="100" width="380" height="108" rx="8" fill="#1a2340" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="310" y="122" text-anchor="middle" fill="#42a5f5" font-size="13" font-weight="bold">ROUTER</text>
  <text x="145" y="144" fill="#b0bec5" font-size="11">logits = X @ W_gate   →  [N, E]</text>
  <text x="145" y="162" fill="#b0bec5" font-size="11">softmax / sigmoid  →  top-K</text>
  <text x="145" y="180" fill="#b0bec5" font-size="11">routing_map [N, E]    probs [N, E]</text>
  <!-- side label -->
  <text x="488" y="162" fill="#546e7a" font-size="10" font-style="italic">which token</text>
  <text x="488" y="174" fill="#546e7a" font-size="10" font-style="italic">goes where</text>

  <!-- arrow: router → permute -->
  <line x1="310" y1="208" x2="310" y2="248" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Permute ── -->
  <rect x="120" y="248" width="380" height="148" rx="8" fill="#1a2b1a" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="310" y="270" text-anchor="middle" fill="#66bb6a" font-size="13" font-weight="bold">PERMUTE  (token_dispatch)</text>
  <text x="145" y="292" fill="#b0bec5" font-size="11">scatter tokens by expert</text>
  <text x="145" y="310" fill="#b0bec5" font-size="11">[N, H]  →  [N·K, H]</text>
  <!-- expert layout block -->
  <rect x="145" y="320" width="185" height="64" rx="4" fill="#0d1a0d" stroke="#388e3c" stroke-width="1"/>
  <text x="155" y="337" fill="#81c784" font-size="10">expert 0:  [ T3 ]</text>
  <text x="155" y="351" fill="#81c784" font-size="10">expert 1:  [ T0, T2, T3 ]</text>
  <text x="155" y="365" fill="#81c784" font-size="10">expert 2:  [ T1 ]</text>
  <text x="155" y="379" fill="#81c784" font-size="10">expert 3:  [ T0, T4 ]</text>
  <!-- tokens label -->
  <text x="488" y="345" fill="#546e7a" font-size="10" font-style="italic">tokens</text>
  <text x="488" y="357" fill="#546e7a" font-size="10" font-style="italic">grouped</text>
  <text x="488" y="369" fill="#546e7a" font-size="10" font-style="italic">by expert</text>

  <!-- arrow: permute → gemm -->
  <line x1="310" y1="396" x2="310" y2="436" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Grouped GEMM ── -->
  <rect x="120" y="436" width="380" height="110" rx="8" fill="#1e1a2e" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="310" y="458" text-anchor="middle" fill="#ab47bc" font-size="13" font-weight="bold">GROUPED GEMM  (×2)</text>
  <text x="145" y="480" fill="#b0bec5" font-size="11">for each expert  i :</text>
  <text x="165" y="498" fill="#b0bec5" font-size="11">up   =  tokens_i  @  W1_i</text>
  <text x="165" y="516" fill="#b0bec5" font-size="11">act  =  activation(up)</text>
  <text x="165" y="534" fill="#b0bec5" font-size="11">down =  act  @  W2_i</text>

  <!-- arrow: gemm → unpermute -->
  <line x1="310" y1="546" x2="310" y2="586" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Unpermute ── -->
  <rect x="120" y="586" width="380" height="120" rx="8" fill="#1a2030" stroke="#ffa726" stroke-width="1.5"/>
  <text x="310" y="608" text-anchor="middle" fill="#ffa726" font-size="13" font-weight="bold">UNPERMUTE  (token_combine)</text>
  <text x="145" y="630" fill="#b0bec5" font-size="11">gather &amp; weighted-merge</text>
  <text x="145" y="648" fill="#b0bec5" font-size="11">[N·K, H]  →  [N, H]</text>
  <rect x="145" y="656" width="245" height="38" rx="4" fill="#0d1218" stroke="#f57c00" stroke-width="1"/>
  <text x="155" y="671" fill="#ffcc80" font-size="10">T0 = p(E1)·E1(T0) + p(E3)·E3(T0)</text>
  <text x="155" y="685" fill="#ffcc80" font-size="10">T3 = p(E0)·E0(T3) + p(E1)·E1(T3)</text>

  <!-- arrow: unpermute → output -->
  <line x1="310" y1="706" x2="310" y2="736" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Output ── -->
  <rect x="185" y="736" width="250" height="44" rx="8" fill="#1e2433" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="310" y="754" text-anchor="middle" fill="#e8eaf6" font-size="13" font-weight="bold">Output tokens</text>
  <text x="310" y="772" text-anchor="middle" fill="#7986cb" font-size="11">[N, H]</text>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
  </defs>

</svg>
